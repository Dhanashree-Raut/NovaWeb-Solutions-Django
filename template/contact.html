{% extends "base.html" %}
{% block title %} Contact {% endblock title %}
{% block content %}

<div class="container py-3">

    <h2 class="text-center mb-5">Contact Us</h2>
    {% if messages %}

    {% for message in messages %}

    {% if messages %}
        {% for message in messages %}
        <div class="alert alert-success alert-dismissible fade show auto-close-alert" role="alert">
            {{ message }}
        </div>
        {% endfor %}
    {% endif %}

    {% endfor %}

    {% endif %}

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card contact-card shadow">

                <div class="card-body p-4">

                    <form action="/contact" method="POST">
                        {% csrf_token %}

                        <div class="form-group">
                            <label>Name</label>
                            <input name="name" type="text" class="form-control" placeholder="Enter Your Name">
                        </div>

                        <div class="form-group">
                            <label>Email</label>
                            <input name="email" type="email" class="form-control" placeholder="Enter Your Email">
                        </div>

                        <div class="form-group">
                            <label>Phone</label>
                            <input name="phone" type="text" class="form-control" placeholder="Enter Your Phone">
                        </div>

                        <div class="form-group">
                            <label>Message</label>
                            <textarea name="desc" class="form-control" rows="4"
                                placeholder="Write your message..."></textarea>
                        </div>

                        <div class="form-group text-right mt-3">
                            <button type="submit" class="btn btn-primary px-4 contact-btn">
                                Send Message
                            </button>
                        </div>


                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
